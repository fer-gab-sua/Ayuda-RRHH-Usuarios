{% extends 'base.html' %}

{% block title %}Iniciar Sesión - Portal RH{% endblock %}

{% block extra_css %}
<style>
.login-main {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #2563eb, #dc2626);
}

.login-container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 400px;
}

.login-logo {
    text-align: center;
    margin-bottom: 30px;
}

.login-logo img {
    max-width: 120px;
    max-height: 120px;
}

.login-title {
    text-align: center;
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 30px;
    color: #1f2937;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #374151;
}

.form-group input {
    width: 100%;
    padding: 12px;
    border: 2px solid #e5e7eb;
    border-radius: 8px;
    font-size: 16px;
    transition: border-color 0.3s;
}

.form-group input:focus {
    outline: none;
    border-color: #2563eb;
}

.login-btn {
    width: 100%;
    background: linear-gradient(135deg, #2563eb, #dc2626);
    color: white;
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s;
}

.login-btn:hover {
    transform: translateY(-2px);
}

.alert {
    padding: 12px;
    margin-bottom: 20px;
    border-radius: 8px;
    background-color: #fee2e2;
    color: #dc2626;
    border: 1px solid #fecaca;
}
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-logo">
        {% load static %}
        <img src="{% static 'img/logo.png' %}" alt="Logo">
    </div>
    <h2 class="login-title">Portal RH</h2>
    
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="{{ form.username.id_for_label }}">Usuario:</label>
            {{ form.username }}
        </div>
        <div class="form-group">
            <label for="{{ form.password.id_for_label }}">Contraseña:</label>
            {{ form.password }}
        </div>
        <button type="submit" class="login-btn">Iniciar Sesión</button>
    </form>
</div>
{% endblock %}
